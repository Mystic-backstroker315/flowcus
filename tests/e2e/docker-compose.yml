services:
  flowcus:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: flowcus-e2e
    # No host port mapping — everything stays inside the e2e network.
    # This prevents interference from real IPFIX traffic on the host.
    expose:
      - "2137"
      - "4739/udp"
    volumes:
      - flowcus-storage:/data/storage
      - ./flowcus-test.toml:/data/config/flowcus.toml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2137/api/health || exit 1"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 5s
    networks:
      - e2e

  test-runner:
    image: python:3.12-slim
    container_name: flowcus-e2e-runner
    depends_on:
      flowcus:
        condition: service_healthy
    volumes:
      - .:/tests:ro
      - flowcus-storage:/data/storage:ro
      - ./artifacts:/artifacts
    working_dir: /tests
    environment:
      FLOWCUS_API: "http://flowcus:2137"
      FLOWCUS_IPFIX_HOST: "flowcus"
      FLOWCUS_IPFIX_PORT: "4739"
      FLOWCUS_STORAGE_DIR: "/data/storage"
      ARTIFACTS_DIR: "/artifacts"
    command: ["python", "-u", "run.py"]
    networks:
      - e2e

volumes:
  flowcus-storage:

networks:
  e2e:
    driver: bridge
