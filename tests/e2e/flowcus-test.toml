# Flowcus test configuration — aggressive flush/merge for fast e2e cycles
[logging]
format = "json"
filter = "debug,tower_http=info"

[server]
host = "0.0.0.0"
port = 2137

[ipfix]
host = "0.0.0.0"
port = 4739
udp = true
tcp = false
template_expiry_secs = 300

[storage]
dir = "/data/storage"
flush_bytes = 4096            # Flush after 4 KB (tiny — forces many small parts)
flush_interval_secs = 1       # Flush every second
partition_duration_secs = 3600
channel_capacity = 1024
initial_row_capacity = 256
merge_workers = 2             # Enough to merge, few enough to observe
merge_scan_interval_secs = 2  # Scan for merges every 2s
merge_cpu_throttle = 0.95     # Don't throttle in test
merge_mem_throttle = 0.95
granule_size = 64             # Tiny granules — exercise mark/bloom paths
bloom_bits_per_granule = 512
mark_cache_bytes = 10485760   # 10 MB
bloom_cache_bytes = 10485760
